name: Deploy to EC2 (PM2)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-o2d-lead-batch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find app directory (server.cjs)
        id: finddir
        run: |
          APP_DIR="$(dirname "$(find . -maxdepth 4 -name server.cjs -print -quit)")"
          if [ -z "$APP_DIR" ]; then
            echo "❌ server.cjs not found"
            echo "Listing repo root:"
            ls -la
            exit 1
          fi
          echo "✅ APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Restore .env (NEVER DELETE)
        run: |
          if [ ! -f "/home/ubuntu/secrets/o2d-backend/.env" ]; then
            echo "❌ Missing /home/ubuntu/secrets/o2d-backend/.env"
            exit 1
          fi
          cp /home/ubuntu/secrets/o2d-backend/.env "$APP_DIR/.env"
          chmod 600 "$APP_DIR/.env"
          echo "✅ .env restored to $APP_DIR/.env"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd "$APP_DIR"
          npm ci --no-audit --no-fund

      - name: Start / Restart PM2
        run: |
          cd "$APP_DIR"

          # remove old wrong app if exists
          pm2 delete o2d-backend || true

          # correct app
          if pm2 describe o2d-lead-batch >/dev/null 2>&1; then
            pm2 restart o2d-lead-batch --update-env --cwd "$(pwd)"
          else
            pm2 start server.cjs --name o2d-lead-batch --cwd "$(pwd)"
          fi

          pm2 save

      - name: Health check
        run: pm2 logs o2d-lead-batch --lines 40 --nostream
