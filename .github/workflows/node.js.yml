name: Deploy to EC2 (PM2)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-o2d-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45

    steps:
      # 1️⃣ Checkout code (no secrets here)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Define fixed app directory
      - name: Set APP_DIR
        run: |
          APP_DIR="/home/ubuntu/actions-runner/_work/O2D-BatchCode-Lead-backend-aws/O2D-BatchCode-Lead-backend-aws"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          echo "✅ APP_DIR set to $APP_DIR"

      # 3️⃣ Ensure .env exists (NEVER overwrite)
      - name: Ensure .env exists safely
        run: |
          if [ ! -f "$APP_DIR/.env" ]; then
            echo "⚠️ .env not found in app dir"

            if [ ! -f "/home/ubuntu/secrets/o2d-backend/.env" ]; then
              echo "❌ Source .env missing in secrets folder"
              exit 1
            fi

            cp /home/ubuntu/secrets/o2d-backend/.env "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "✅ .env copied securely"
          else
            echo "✅ .env already exists — untouched"
          fi

      # 3.5️⃣ Verify .env integrity (extra safety)
      - name: Verify .env integrity
        run: |
          if [ ! -s "$APP_DIR/.env" ]; then
            echo "❌ .env missing or empty — aborting deploy"
            exit 1
          fi
          echo "✅ .env integrity verified"

      # 4️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 5️⃣ Install system dependencies (Oracle needs this)
      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y unzip wget \
            || sudo apt-get install -y libaio1t64 unzip wget
          echo "✅ System dependencies installed"

      # 6️⃣ Install npm dependencies
      - name: Install npm dependencies
        run: |
          cd "$APP_DIR"
          npm ci --no-audit --no-fund

      # 7️⃣ Start / Restart PM2 (ONLY ONE APP)
      - name: Start / Restart PM2 (o2d-backend)
        run: |
          cd "$APP_DIR"

          pm2 delete o2d-lead-batch || true
          pm2 delete o2d-backend || true

          pm2 start server.js \
            --name o2d-backend \
            --update-env

          pm2 save
          echo "✅ PM2 o2d-backend started"

      # 8️⃣ Health check (local + public)
      - name: Health check
        run: |
          echo "⏳ Waiting for port 3004..."

          for i in {1..15}; do
            if ss -lnt | grep -q ":3004"; then
              echo "✅ Port 3004 is listening"
              break
            fi
            sleep 2
          done

          curl -f http://127.0.0.1:3004/health
          curl -f -k https://o2d.sagartmt.com/api/health || echo "⚠️ Public health skipped"

          echo "🎉 Deploy successful"
