name: 🚀 Auto Deploy to EC2 (Master)

on:
  push:
    branches:
      - master   # ✅ master branch

jobs:
  deploy:
    runs-on: self-hosted   # ✅ EC2 runner

    steps:
      # 1️⃣ Checkout WITHOUT deleting .env
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false   # 🔥 important (.env safe)

      # 2️⃣ Setup Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # 4️⃣ Restart PM2 safely
      - name: 🚀 Restart PM2
        run: |
          pm2 restart batchcode-backend --update-env || \
          pm2 start server.js --name batchcode-backend
          pm2 save