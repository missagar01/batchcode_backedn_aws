name: 🚀 Auto Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout Code (DO NOT clean untracked files)
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false   # 🔥 Important (will NOT delete .env)

      # 2️⃣ Setup Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # 4️⃣ Restart App Safely (env preserved)
      - name: 🚀 Restart PM2
        run: |
          pm2 restart batchcode-backend --update-env || \
          pm2 start server.js --name batchcode-backend
          pm2 save