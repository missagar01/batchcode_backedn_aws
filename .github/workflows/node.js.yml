name: Deploy to EC2 (Self Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔨 Build Project (if required)
        run: |
          if [ -f package.json ] && grep -q "\"build\"" package.json; then
            npm run build
          else
            echo "No build script found, skipping build."
          fi

      - name: 🔁 Restart PM2
        run: |
          pm2 delete batchcode-backend || true
          pm2 start ecosystem.config.js || pm2 start index.js --name batchcode-backend
          pm2 save